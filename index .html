
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LeñaControl</title>
<style>
body { font-family: Arial; background:#f3f8f2; padding:20px;}
h1 { color:#2e7d32;}
input, select, button { padding:8px; margin:5px; }
table { width:100%; margin-top:20px; border-collapse: collapse;}
th, td { border:1px solid #ccc; padding:8px; text-align:center;}
</style>
</head>
<body>

<h1>LeñaControl</h1>

<h3>Nueva venta</h3>
<select id="producto"></select>
<input type="number" id="cantidad" placeholder="Unidades">
<input type="number" id="precio" placeholder="Precio por unidad">
<button onclick="guardarVenta()">Guardar</button>

<h3>Historial</h3>
<table>
<thead>
<tr><th>Producto</th><th>Unidades</th><th>Precio</th><th>Total</th></tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script>
const productos = {
"Astilla eucalipto":180,
"Astilla hualle":250,
"Saco eucalipto":5000,
"Saco hualle":7000,
"Saco rojo":4000,
"Malla encendido":1500,
"Metro cúbico hualle":65000,
"Metro cúbico eucalipto":55000
};

const select = document.getElementById("producto");
for (let p in productos){
  let option = document.createElement("option");
  option.value = p;
  option.text = p;
  select.appendChild(option);
}

select.addEventListener("change", ()=>{
  document.getElementById("precio").value = productos[select.value];
});

function guardarVenta(){
  let prod = select.value;
  let cant = parseFloat(document.getElementById("cantidad").value);
  let precio = parseFloat(document.getElementById("precio").value);
  let total = cant * precio;

  let ventas = JSON.parse(localStorage.getItem("ventas")||"[]");
  ventas.push({prod, cant, precio, total});
  localStorage.setItem("ventas", JSON.stringify(ventas));

  cargar();
}

function cargar(){
  let tabla = document.getElementById("tabla");
  tabla.innerHTML="";
  let ventas = JSON.parse(localStorage.getItem("ventas")||"[]");
  ventas.forEach(v=>{
    let row = `<tr>
    <td>${v.prod}</td>
    <td>${v.cant}</td>
    <td>${v.precio}</td>
    <td>${v.total}</td>
    </tr>`;
    tabla.innerHTML += row;
  });
}

cargar();
</script>

</body>
</html>
